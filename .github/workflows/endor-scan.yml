name: Endor Labs Scan

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  # ── Full scan on merge to main/master ─────────────────────────────────────
  full-scan:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Endor Labs scan
        uses: endorlabs/github-action@v1
        with:
          namespace: "endor-solutions-tsaekao"
          pr: false
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # ── PR scan with triage comment ───────────────────────────────────────────
  pr-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Endor Labs scan
        uses: endorlabs/github-action@v1
        with:
          namespace: "endor-solutions-tsaekao"
          pr: true
          pr_incremental: true
          enable_pr_comments: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install endorctl
        run: |
          curl -fsSL https://api.endorlabs.com/download/latest/endorctl_linux_amd64 -o endorctl
          chmod +x endorctl
          sudo mv endorctl /usr/local/bin/endorctl

      - name: Post triage comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENDOR_NAMESPACE: "endor-solutions-tsaekao"
          ENDOR_PROJECT_UUID: "69d0144295e0eff4c8bcd4b7"
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python3 scripts/post_triage_comment.py
