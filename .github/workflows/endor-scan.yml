name: Endor Labs Scan

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  # ── Full scan on merge ────────────────────────────────────────────────────
  full-scan:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Install endorctl
        run: |
          curl -fsSL https://api.endorlabs.com/download/latest/endorctl_linux_amd64 \
            -o endorctl && chmod +x endorctl && sudo mv endorctl /usr/local/bin/endorctl

      - name: Endor Labs scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          endorctl scan \
            --namespace=endor-solutions-tsaekao

  # ── PR scan with triage comment ───────────────────────────────────────────
  pr-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Install endorctl
        run: |
          curl -fsSL https://api.endorlabs.com/download/latest/endorctl_linux_amd64 \
            -o endorctl && chmod +x endorctl && sudo mv endorctl /usr/local/bin/endorctl

      - name: Endor Labs scan and post triage comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          endorctl scan \
            --pr \
            --pr-incremental \
            --enable-pr-comments \
            --namespace=endor-solutions-tsaekao

          python3 scripts/post_triage_comment.py
